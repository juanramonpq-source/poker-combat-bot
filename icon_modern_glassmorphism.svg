<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes Glassmorphism -->
    <linearGradient id="glassGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.1" />
    </linearGradient>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0033;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="robotRedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0040;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="robotBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>

    <!-- Efectos de Sombra -->
    <filter id="shadowGlass">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Borde Glassmorphism -->
    <filter id="glassEffect">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feOffset in="blur" dx="0" dy="2"/>
    </filter>
  </defs>

  <!-- FONDO OSCURO -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>

  <!-- CONTENEDOR PRINCIPAL CON EFECTO VIDRIO -->
  <rect x="20" y="20" width="472" height="472" rx="30"
        fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="2"
        filter="url(#shadowGlass)"/>

  <!-- ================== ROBOT ROJO (ATACANDO) ================== -->
  <g transform="translate(80, 120)">
    <!-- Contenedor glassmorphism -->
    <rect x="0" y="0" width="140" height="160" rx="20"
          fill="rgba(255, 107, 107, 0.1)" stroke="url(#robotRedGradient)" stroke-width="2"
          filter="url(#shadowGlass)"/>

    <!-- Cabeza -->
    <circle cx="70" cy="30" r="18" fill="url(#robotRedGradient)" filter="url(#glow)"/>
    <circle cx="70" cy="30" r="18" fill="url(#glassGradient1)" stroke="rgba(255,107,107,0.5)" stroke-width="1"/>

    <!-- Ojos tipo LED -->
    <circle cx="62" cy="26" r="3" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="78" cy="26" r="3" fill="#00ff88" filter="url(#glow)"/>

    <!-- Cuello/conexión -->
    <rect x="65" y="48" width="10" height="8" rx="2" fill="url(#robotRedGradient)"/>

    <!-- Cuerpo/Torso -->
    <rect x="45" y="56" width="50" height="55" rx="10"
          fill="url(#robotRedGradient)" stroke="rgba(255,107,107,0.5)" stroke-width="1"/>

    <!-- Panel central brillo -->
    <rect x="50" y="65" width="40" height="35" rx="8"
          fill="url(#glassGradient1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

    <!-- Brazos extendidos (pose atacante) -->
    <!-- Brazo izquierdo -->
    <g transform="translate(45, 70)">
      <rect x="-20" y="0" width="18" height="12" rx="6" fill="url(#robotRedGradient)"/>
      <circle cx="-20" cy="6" r="8" fill="url(#robotRedGradient)"
              stroke="rgba(255,107,107,0.6)" stroke-width="1"/>
      <!-- Energía en mano -->
      <circle cx="-20" cy="6" r="4" fill="#ffff00" filter="url(#glow)" opacity="0.8"/>
    </g>

    <!-- Brazo derecho -->
    <g transform="translate(95, 70)">
      <rect x="2" y="0" width="18" height="12" rx="6" fill="url(#robotRedGradient)"/>
      <circle cx="20" cy="6" r="8" fill="url(#robotRedGradient)"
              stroke="rgba(255,107,107,0.6)" stroke-width="1"/>
      <!-- Energía en mano -->
      <circle cx="20" cy="6" r="4" fill="#ffff00" filter="url(#glow)" opacity="0.8"/>
    </g>

    <!-- Piernas -->
    <rect x="52" y="115" width="8" height="25" rx="4" fill="url(#robotRedGradient)"/>
    <rect x="68" y="115" width="8" height="25" rx="4" fill="url(#robotRedGradient)"/>

    <!-- Botas brillantes -->
    <ellipse cx="56" cy="143" rx="6" ry="4" fill="rgba(255,255,255,0.3)"/>
    <ellipse cx="72" cy="143" rx="6" ry="4" fill="rgba(255,255,255,0.3)"/>

    <!-- Etiqueta -->
    <text x="70" y="158" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
          text-anchor="middle" fill="#ff6b6b">ATTACK</text>
  </g>

  <!-- ================== ROBOT AZUL (DEFENDIENDO) ================== -->
  <g transform="translate(292, 120)">
    <!-- Contenedor glassmorphism -->
    <rect x="0" y="0" width="140" height="160" rx="20"
          fill="rgba(78, 205, 196, 0.1)" stroke="url(#robotBlueGradient)" stroke-width="2"
          filter="url(#shadowGlass)"/>

    <!-- Cabeza -->
    <circle cx="70" cy="30" r="18" fill="url(#robotBlueGradient)" filter="url(#glow)"/>
    <circle cx="70" cy="30" r="18" fill="url(#glassGradient1)" stroke="rgba(78,205,196,0.5)" stroke-width="1"/>

    <!-- Ojos tipo LED -->
    <circle cx="62" cy="26" r="3" fill="#00ff88" filter="url(#glow)"/>
    <circle cx="78" cy="26" r="3" fill="#00ff88" filter="url(#glow)"/>

    <!-- Cuello -->
    <rect x="65" y="48" width="10" height="8" rx="2" fill="url(#robotBlueGradient)"/>

    <!-- Cuerpo/Torso -->
    <rect x="45" y="56" width="50" height="55" rx="10"
          fill="url(#robotBlueGradient)" stroke="rgba(78,205,196,0.5)" stroke-width="1"/>

    <!-- Panel central/Escudo -->
    <rect x="50" y="65" width="40" height="35" rx="8"
          fill="url(#glassGradient1)" stroke="rgba(78,205,196,0.4)" stroke-width="2"/>

    <!-- Símbolo de escudo -->
    <path d="M 65 75 L 75 75 L 75 90 Q 70 95 65 90 Q 60 95 55 90 L 55 75 Z"
          fill="url(#robotBlueGradient)" opacity="0.6"/>

    <!-- Brazos en posición defensiva (levantados) -->
    <!-- Brazo izquierdo -->
    <g transform="translate(45, 55)">
      <rect x="-20" y="-8" width="18" height="12" rx="6" fill="url(#robotBlueGradient)"/>
      <circle cx="-20" cy="-2" r="8" fill="url(#robotBlueGradient)"
              stroke="rgba(78,205,196,0.6)" stroke-width="1"/>
    </g>

    <!-- Brazo derecho -->
    <g transform="translate(95, 55)">
      <rect x="2" y="-8" width="18" height="12" rx="6" fill="url(#robotBlueGradient)"/>
      <circle cx="20" cy="-2" r="8" fill="url(#robotBlueGradient)"
              stroke="rgba(78,205,196,0.6)" stroke-width="1"/>
    </g>

    <!-- Piernas más anchas (base estable) -->
    <rect x="50" y="115" width="12" height="25" rx="4" fill="url(#robotBlueGradient)"/>
    <rect x="68" y="115" width="12" height="25" rx="4" fill="url(#robotBlueGradient)"/>

    <!-- Botas brillantes -->
    <ellipse cx="56" cy="143" rx="7" ry="4" fill="rgba(255,255,255,0.3)"/>
    <ellipse cx="74" cy="143" rx="7" ry="4" fill="rgba(255,255,255,0.3)"/>

    <!-- Etiqueta -->
    <text x="70" y="158" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
          text-anchor="middle" fill="#4ecdc4">DEFEND</text>
  </g>

  <!-- ================== EFECTO DE COMBATE EN EL CENTRO ================== -->
  <g transform="translate(256, 140)" filter="url(#glow)">
    <!-- Líneas de energía -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#ffff00" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="#ffff00" opacity="0.4"/>
    <circle cx="0" cy="0" r="4" fill="#ffff00"/>

    <!-- Partículas de energía -->
    <circle cx="-30" cy="-10" r="2" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="30" cy="10" r="2" fill="#4ecdc4" opacity="0.8"/>
    <circle cx="-20" cy="15" r="1.5" fill="#ffd700" opacity="0.7"/>
    <circle cx="25" cy="-8" r="1.5" fill="#ffd700" opacity="0.7"/>
  </g>

  <!-- ================== CARTAS DE PÓKER (ACCESORIOS) ================== -->
  <!-- Carta A♠ (Rojo) -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="50" height="70" rx="6"
          fill="rgba(255,255,255,0.1)" stroke="url(#robotRedGradient)" stroke-width="2"
          filter="url(#shadowGlass)"/>
    <circle cx="25" cy="15" r="4" fill="url(#robotRedGradient)"/>
    <text x="25" y="22" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
          text-anchor="middle" fill="#ff6b6b">A</text>
    <path d="M 20 40 L 30 40 L 28 55 L 22 55 Z" fill="url(#robotRedGradient)"/>
    <text x="25" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
          text-anchor="middle" fill="#ff6b6b">♠</text>
  </g>

  <!-- Carta K♥ (Azul) -->
  <g transform="translate(412, 310)">
    <rect x="0" y="0" width="50" height="70" rx="6"
          fill="rgba(255,255,255,0.1)" stroke="url(#robotBlueGradient)" stroke-width="2"
          filter="url(#shadowGlass)"/>
    <circle cx="25" cy="15" r="4" fill="url(#robotBlueGradient)"/>
    <text x="25" y="22" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
          text-anchor="middle" fill="#4ecdc4">K</text>
    <path d="M 20 40 L 30 40 L 28 55 L 22 55 Z" fill="url(#robotBlueGradient)"/>
    <text x="25" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
          text-anchor="middle" fill="#4ecdc4">♥</text>
  </g>

  <!-- ================== TÍTULO MODERNO ================== -->
  <g transform="translate(256, 420)">
    <!-- Barra decorativa -->
    <rect x="-60" y="-8" width="120" height="2" rx="1" fill="url(#purpleGradient)"/>

    <!-- Texto principal -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
          text-anchor="middle" fill="#ffffff">POKER COMBAT</text>

    <!-- Subtítulo -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="300"
          text-anchor="middle" fill="rgba(255,255,255,0.7)">Modern. Strategic. Elegant.</text>

    <!-- Barra decorativa inferior -->
    <rect x="-60" y="26" width="120" height="2" rx="1" fill="url(#purpleGradient)"/>
  </g>

  <!-- ================== DETALLES DE DISEÑO ================== -->
  <!-- Puntos decorativos superiores -->
  <circle cx="80" cy="50" r="2" fill="url(#robotRedGradient)" opacity="0.4"/>
  <circle cx="432" cy="50" r="2" fill="url(#robotBlueGradient)" opacity="0.4"/>
  <circle cx="256" cy="45" r="2" fill="url(#purpleGradient)" opacity="0.4"/>

  <!-- Línea central sutil -->
  <line x1="256" y1="300" x2="256" y2="380" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>
</svg>