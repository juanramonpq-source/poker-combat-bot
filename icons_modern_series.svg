<svg viewBox="0 0 2048 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0040;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ICONO 1: ATAQUE (Punño/Golpe) -->
  <g transform="translate(50, 50)">
    <circle cx="106" cy="106" r="95" fill="rgba(255,107,107,0.1)" stroke="url(#redGrad)" stroke-width="3"/>
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,255,0.05)"/>

    <!-- Puño -->
    <circle cx="106" cy="85" r="28" fill="url(#redGrad)" filter="url(#glow)"/>
    <!-- Brillo -->
    <circle cx="106" cy="85" r="28" fill="rgba(255,255,255,0.2)"/>

    <!-- Línea de impacto -->
    <line x1="140" y1="85" x2="200" y2="85" stroke="url(#redGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="150" y1="70" x2="210" y2="55" stroke="url(#redGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="150" y1="100" x2="210" y2="115" stroke="url(#redGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

    <!-- Partículas de impacto -->
    <circle cx="190" cy="75" r="2" fill="url(#redGrad)"/>
    <circle cx="195" cy="100" r="2.5" fill="url(#redGrad)"/>
    <circle cx="185" cy="110" r="1.5" fill="url(#redGrad)"/>
  </g>

  <!-- ICONO 2: DEFENSA (Escudo) -->
  <g transform="translate(262, 50)">
    <circle cx="106" cy="106" r="95" fill="rgba(78,205,196,0.1)" stroke="url(#blueGrad)" stroke-width="3"/>
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,255,0.05)"/>

    <!-- Escudo principal -->
    <path d="M 106 70 L 140 95 L 140 130 Q 106 150 72 130 L 72 95 Z"
          fill="url(#blueGrad)" stroke="rgba(78,205,196,0.6)" stroke-width="2"/>

    <!-- Brillo en escudo -->
    <ellipse cx="100" cy="95" rx="12" ry="15" fill="rgba(255,255,255,0.3)"/>

    <!-- Líneas de defensa -->
    <line x1="50" y1="106" x2="72" y2="106" stroke="url(#blueGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="40" y1="85" x2="65" y2="95" stroke="url(#blueGrad)" stroke-width="2" opacity="0.5"/>
    <line x1="40" y1="127" x2="65" y2="117" stroke="url(#blueGrad)" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- ICONO 3: CONSTRUCCIÓN (Engranaje/Build) -->
  <g transform="translate(474, 50)">
    <circle cx="106" cy="106" r="95" fill="rgba(168,85,247,0.1)" stroke="url(#purpleGrad)" stroke-width="3"/>
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,255,0.05)"/>

    <!-- Engranaje -->
    <circle cx="106" cy="106" r="35" fill="none" stroke="url(#purpleGrad)" stroke-width="3"/>

    <!-- Dientes del engranaje -->
    <g>
      <rect x="102" y="65" width="8" height="12" fill="url(#purpleGrad)"/>
      <rect x="130" y="82" width="12" height="8" fill="url(#purpleGrad)"/>
      <rect x="147" y="110" width="12" height="8" fill="url(#purpleGrad)"/>
      <rect x="130" y="138" width="12" height="8" fill="url(#purpleGrad)"/>
      <rect x="102" y="155" width="8" height="12" fill="url(#purpleGrad)"/>
      <rect x="70" y="138" width="12" height="8" fill="url(#purpleGrad)"/>
      <rect x="53" y="110" width="12" height="8" fill="url(#purpleGrad)"/>
      <rect x="70" y="82" width="12" height="8" fill="url(#purpleGrad)"/>
    </g>

    <!-- Centro brillante -->
    <circle cx="106" cy="106" r="15" fill="url(#purpleGrad)" filter="url(#glow)"/>
    <circle cx="106" cy="106" r="15" fill="rgba(255,255,255,0.2)"/>

    <!-- Herramientas alrededor -->
    <path d="M 170 70 L 175 65 L 180 70" stroke="url(#purpleGrad)" stroke-width="2" fill="none"/>
  </g>

  <!-- ICONO 4: CARTAS/POKER (As de Corazones) -->
  <g transform="translate(686, 50)">
    <circle cx="106" cy="106" r="95" fill="rgba(251,191,36,0.1)" stroke="url(#goldGrad)" stroke-width="3"/>
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,255,0.05)"/>

    <!-- Carta -->
    <rect x="80" y="60" width="52" height="92" rx="6"
          fill="rgba(255,255,255,0.9)" stroke="url(#goldGrad)" stroke-width="2"/>

    <!-- Esquina superior izquierda -->
    <text x="88" y="80" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff0000">A</text>

    <!-- Símbolo central -->
    <text x="106" y="125" font-family="Arial, sans-serif" font-size="36" font-weight="bold"
          text-anchor="middle" fill="url(#redGrad)">♥</text>

    <!-- Brillo en carta -->
    <ellipse cx="95" cy="85" rx="6" ry="10" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- ICONO 5: VELOCIDAD/TURNOS (Reloj/Velocidad) -->
  <g transform="translate(898, 50)">
    <circle cx="106" cy="106" r="95" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="3"/>
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,255,0.05)"/>

    <!-- Reloj/círculo -->
    <circle cx="106" cy="106" r="40" fill="none" stroke="#3b82f6" stroke-width="3"/>

    <!-- Agujas de reloj dinámicas -->
    <line x1="106" y1="106" x2="106" y2="75" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="106" y1="106" x2="130" y2="106" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>

    <!-- Centro -->
    <circle cx="106" cy="106" r="6" fill="#3b82f6" filter="url(#glow)"/>

    <!-- Marca de velocidad -->
    <circle cx="106" cy="69" r="3" fill="#3b82f6"/>

    <!-- Líneas de movimiento -->
    <line x1="155" y1="90" x2="175" y2="70" stroke="#3b82f6" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <line x1="160" y1="120" x2="180" y2="120" stroke="#3b82f6" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- ICONO 6: VICTORIA/RANKING (Corona) -->
  <g transform="translate(1110, 50)">
    <circle cx="106" cy="106" r="95" fill="rgba(251,191,36,0.1)" stroke="url(#goldGrad)" stroke-width="3"/>
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,255,0.05)"/>

    <!-- Base de corona -->
    <rect x="75" y="110" width="62" height="8" rx="2" fill="url(#goldGrad)"/>

    <!-- Puntas de corona -->
    <!-- Centro alto -->
    <polygon points="106,55 115,85 97,85" fill="url(#goldGrad)" filter="url(#glow)"/>
    <!-- Izquierda -->
    <polygon points="80,75 85,95 70,90" fill="url(#goldGrad)"/>
    <!-- Derecha -->
    <polygon points="132,75 127,95 142,90" fill="url(#goldGrad)"/>

    <!-- Joyas en la corona -->
    <circle cx="106" cy="85" r="4" fill="#ff0000"/>
    <circle cx="82" cy="88" r="3" fill="#00d4ff"/>
    <circle cx="130" cy="88" r="3" fill="#00d4ff"/>

    <!-- Brillo -->
    <ellipse cx="100" cy="75" rx="8" ry="6" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- ICONO 7: ENERGÍA/PODER (Rayo) -->
  <g transform="translate(1322, 50)">
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,0,0.1)" stroke="#ffff00" stroke-width="3"/>
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,255,0.05)"/>

    <!-- Rayo/Trueno -->
    <polygon points="106,60 120,95 110,95 130,145 100,110 110,110"
             fill="url(#goldGrad)" filter="url(#glow)"
             stroke="rgba(255,255,0,0.5)" stroke-width="1"/>

    <!-- Aura energética -->
    <circle cx="106" cy="100" r="50" fill="none" stroke="#ffff00" stroke-width="1" opacity="0.3"/>
    <circle cx="106" cy="100" r="55" fill="none" stroke="#ffff00" stroke-width="0.5" opacity="0.15"/>

    <!-- Puntos de energía alrededor -->
    <circle cx="70" cy="80" r="2" fill="#ffff00" opacity="0.6"/>
    <circle cx="142" cy="90" r="2" fill="#ffff00" opacity="0.6"/>
    <circle cx="80" cy="130" r="2" fill="#ffff00" opacity="0.6"/>
    <circle cx="135" cy="125" r="2" fill="#ffff00" opacity="0.6"/>
  </g>

  <!-- ICONO 8: ESTRATEGIA (Cerebro/Estrategia) -->
  <g transform="translate(1534, 50)">
    <circle cx="106" cy="106" r="95" fill="rgba(168,85,247,0.1)" stroke="url(#purpleGrad)" stroke-width="3"/>
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,255,0.05)"/>

    <!-- Forma cerebral simplificada -->
    <ellipse cx="85" cy="95" rx="20" ry="22" fill="url(#purpleGrad)"/>
    <ellipse cx="127" cy="95" rx="20" ry="22" fill="url(#purpleGrad)"/>
    <ellipse cx="106" cy="125" rx="32" ry="28" fill="url(#purpleGrad)"/>

    <!-- Conexiones neurales -->
    <line x1="85" y1="120" x2="106" y2="150" stroke="rgba(168,85,247,0.6)" stroke-width="1.5"/>
    <line x1="127" y1="120" x2="106" y2="150" stroke="rgba(168,85,247,0.6)" stroke-width="1.5"/>
    <line x1="85" y1="100" x2="127" y2="100" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>

    <!-- Brillo inteligencia -->
    <circle cx="90" cy="90" r="3" fill="rgba(255,255,255,0.5)"/>
    <circle cx="122" cy="90" r="3" fill="rgba(255,255,255,0.5)"/>
  </g>

  <!-- ICONO 9: MULTIPLICADOR/BONUS (Estrella) -->
  <g transform="translate(1746, 50)">
    <circle cx="106" cy="106" r="95" fill="rgba(251,191,36,0.1)" stroke="url(#goldGrad)" stroke-width="3"/>
    <circle cx="106" cy="106" r="95" fill="rgba(255,255,255,0.05)"/>

    <!-- Estrella -->
    <polygon points="106,60 115,90 147,90 123,110 132,140 106,120 80,140 89,110 65,90 97,90"
             fill="url(#goldGrad)" filter="url(#glow)"
             stroke="rgba(251,191,36,0.6)" stroke-width="1"/>

    <!-- Puntos brillantes alrededor -->
    <circle cx="60" cy="80" r="2" fill="url(#goldGrad)"/>
    <circle cx="152" cy="85" r="2" fill="url(#goldGrad)"/>
    <circle cx="70" cy="140" r="2" fill="url(#goldGrad)"/>
    <circle cx="140" cy="145" r="2" fill="url(#goldGrad)"/>
  </g>
</svg>